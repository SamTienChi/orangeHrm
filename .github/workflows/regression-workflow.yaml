name: Karate API Tests
run-name: ${{ github.actor }} is testing regression demo workflow

on:
  push:
    branches:
      - main

  schedule:
    - cron: '59 23 * * 5'
#  workflow_dispatch:

jobs:
  call-reusable:
    uses: ./.github/workflows/reusable-workflow.yaml
    with:
      java-version: '21'

  run-karate-test:
    runs-on: windows-latest
    needs: call-reusable
    env:
      regression: regression
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '21'

      - name: Run regression tests
        run: mvn test -Dtest=TestRunner#runTest "-Dkarate.options=--tags @${{env.regression}}"

      - name: Upload Karate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: karate-report
          path: target/karate-reports/