name: Reusable CI

on:
  workflow_call:
    inputs:
      java-version:
        required: true
        type: string
jobs:
  builds:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version:  ${{ inputs.java-version }}